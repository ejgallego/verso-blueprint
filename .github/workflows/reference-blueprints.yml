name: Reference Blueprints

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-reference-blueprints:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: Build Project Template
            project_id: project-template
            artifact_name: reference-blueprints-project-template
            artifact_path: _out/reference-blueprints/project-template
          - job_name: Build Sphere Packing
            project_id: spherepackingblueprint
            artifact_name: reference-blueprints-spherepacking
            artifact_path: _out/reference-blueprints/spherepackingblueprint
          - job_name: Build Noperthedron
            project_id: noperthedron
            artifact_name: reference-blueprints-noperthedron
            artifact_path: _out/reference-blueprints/noperthedron
          - job_name: Build Verso FLT
            project_id: verso-flt
            artifact_name: reference-blueprints-verso-flt
            artifact_path: _out/reference-blueprints/verso-flt
    env:
      BP_REFERENCE_CHECKOUT_MODE: shared
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake package cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/mathlib
            .lake/packages/verso
          key: ${{ runner.os }}-lake-packages-v2-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-packages-v2-
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          python3 --version
      - name: Generate reference blueprint
        run: ./scripts/generate-reference-blueprints.sh --project ${{ matrix.project_id }}
      - name: Upload reference blueprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  build-test-blueprints:
    name: Build Test Blueprints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake package cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/mathlib
            .lake/packages/verso
          key: ${{ runner.os }}-lake-packages-v2-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-packages-v2-
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          python3 --version
      - name: Generate test blueprints
        run: ./scripts/generate-test-blueprints.sh
      - name: Upload test blueprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-blueprints
          path: _out/test-blueprints

  build-site-artifact:
    name: Build Site Artifact
    runs-on: ubuntu-latest
    needs:
      - build-reference-blueprints
      - build-test-blueprints
    steps:
      - uses: actions/checkout@v4
      - name: Download sphere packing artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprints-spherepacking
          path: _out/reference-blueprints/spherepackingblueprint
      - name: Download starter template artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprints-project-template
          path: _out/reference-blueprints/project-template
      - name: Download noperthedron artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprints-noperthedron
          path: _out/reference-blueprints/noperthedron
      - name: Download verso-flt artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprints-verso-flt
          path: _out/reference-blueprints/verso-flt
      - name: Download test blueprints artifact
        uses: actions/download-artifact@v4
        with:
          name: test-blueprints
          path: _out/test-blueprints
      - name: Prepare site artifact
        run: python3 ./scripts/prepare_reference_blueprints_pages.py
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-blueprints-site
          path: _site
