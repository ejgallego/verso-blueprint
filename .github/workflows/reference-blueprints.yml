name: Reference Blueprints Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: reference-blueprints-pages
  cancel-in-progress: true

jobs:
  build-spherepacking-and-template:
    name: Build Sphere Packing and Starter Template
    runs-on: ubuntu-latest
    env:
      BP_REFERENCE_CHECKOUT_MODE: shared
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/mathlib/.lake/build
            .lake/packages/verso/.lake/build
          key: ${{ runner.os }}-lake-deps-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-deps-
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          python3 --version
      - name: Generate sphere packing and starter template
        run: ./scripts/generate-reference-blueprints.sh --project project-template --project spherepackingblueprint
      - name: Upload sphere packing artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-blueprint-spherepacking
          path: _out/reference-blueprints/spherepackingblueprint
      - name: Upload starter template artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-blueprint-project-template
          path: _out/reference-blueprints/project-template

  build-noperthedron:
    name: Build Noperthedron
    runs-on: ubuntu-latest
    env:
      BP_REFERENCE_CHECKOUT_MODE: shared
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/mathlib/.lake/build
            .lake/packages/verso/.lake/build
          key: ${{ runner.os }}-lake-deps-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-deps-
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          python3 --version
      - name: Generate noperthedron
        run: ./scripts/generate-reference-blueprints.sh --project noperthedron
      - name: Upload noperthedron artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-blueprint-noperthedron
          path: _out/reference-blueprints/noperthedron

  build-pages-artifact:
    name: Build Pages Artifact
    runs-on: ubuntu-latest
    needs:
      - build-spherepacking-and-template
      - build-noperthedron
    steps:
      - uses: actions/checkout@v4
      - name: Download sphere packing artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprint-spherepacking
          path: _out/reference-blueprints/spherepackingblueprint
      - name: Download starter template artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprint-project-template
          path: _out/reference-blueprints/project-template
      - name: Download noperthedron artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprint-noperthedron
          path: _out/reference-blueprints/noperthedron
      - name: Prepare Pages artifact
        run: python3 ./scripts/prepare_reference_blueprints_pages.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy Pages
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build-pages-artifact
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
