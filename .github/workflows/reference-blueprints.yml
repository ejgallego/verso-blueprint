name: Reference Blueprints Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: reference-blueprints-pages
  cancel-in-progress: true

jobs:
  build-reference-blueprints:
    name: Build Reference Blueprints
    uses: ./.github/workflows/reference-blueprints-build.yml

  build-pages-artifact:
    name: Build Pages Artifact
    runs-on: ubuntu-latest
    needs:
      - build-reference-blueprints
    steps:
      - uses: actions/checkout@v4
      - name: Download sphere packing artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprints-spherepacking
          path: _out/reference-blueprints/spherepackingblueprint
      - name: Download starter template artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprints-project-template
          path: _out/reference-blueprints/project-template
      - name: Download noperthedron artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-blueprints-noperthedron
          path: _out/reference-blueprints/noperthedron
      - name: Prepare Pages artifact
        run: python3 ./scripts/prepare_reference_blueprints_pages.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy Pages
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build-pages-artifact
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
