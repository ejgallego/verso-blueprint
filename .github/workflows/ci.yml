name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  blueprint-build:
    name: Blueprint Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          python3 --version
      - name: Build package
        run: ./scripts/lean-low-priority lake build

  blueprint-tests:
    name: Blueprint Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Run Lean tests
        run: ./scripts/lean-low-priority lake test

  harness-tests:
    name: Harness Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Run Python harness tests
        run: python3 -m unittest discover -s tests/harness -p 'test_*.py'
      - name: Check Python harness syntax
        run: python3 -m py_compile scripts/blueprint_harness.py scripts/blueprint_harness_paths.py scripts/blueprint_harness_projects.py scripts/blueprint_harness_worktrees.py scripts/prepare_reference_blueprints_pages.py

  reference-blueprints:
    name: Reference Blueprint Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Generate reference blueprints
        run: ./scripts/generate-reference-blueprints.sh
      - name: Upload reference blueprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-blueprints
          path: _out/reference-blueprints
