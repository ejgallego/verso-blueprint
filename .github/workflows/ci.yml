name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  blueprint-build:
    name: Blueprint Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/mathlib/.lake/build
            .lake/packages/verso/.lake/build
          key: ${{ runner.os }}-lake-deps-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-deps-
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          python3 --version
      - name: Build package
        run: ./scripts/lean-low-priority lake build

  blueprint-tests:
    name: Blueprint Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/mathlib/.lake/build
            .lake/packages/verso/.lake/build
          key: ${{ runner.os }}-lake-deps-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-deps-
      - name: Run Lean tests
        run: ./scripts/lean-low-priority lake test

  harness-tests:
    name: Harness Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Run Python harness tests
        run: python3 -m unittest discover -s tests/harness -p 'test_*.py'
      - name: Check Python harness syntax
        run: python3 -m py_compile scripts/blueprint_harness.py scripts/blueprint_reference_harness.py scripts/blueprint_harness_cli.py scripts/blueprint_harness_paths.py scripts/blueprint_harness_projects.py scripts/blueprint_harness_worktrees.py scripts/check_project_template_fresh_repo.py scripts/prepare_reference_blueprints_pages.py

  project-template-fresh-repo:
    name: Project Template Fresh Repo
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint GitHub workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: .github/workflows/ci.yml .github/workflows/reference-blueprints.yml project_template/.github/workflows/pages.yml
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          python3 --version
      - name: Run fresh-repo template CI smoke
        run: python3 ./scripts/check_project_template_fresh_repo.py --site-output _out/project-template-fresh-repo/html-multi
      - name: Upload fresh-repo template artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-template-fresh-repo
          path: _out/project-template-fresh-repo
