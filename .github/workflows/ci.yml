name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  blueprint-build:
    name: Blueprint Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/mathlib/.lake/build
            .lake/packages/verso/.lake/build
          key: ${{ runner.os }}-lake-deps-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-deps-
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          python3 --version
      - name: Build package
        run: ./scripts/lean-low-priority lake build

  blueprint-tests:
    name: Blueprint Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/mathlib/.lake/build
            .lake/packages/verso/.lake/build
          key: ${{ runner.os }}-lake-deps-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-deps-
      - name: Run Lean tests
        run: ./scripts/lean-low-priority lake test

  harness-tests:
    name: Harness Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Run Python harness tests
        run: python3 -m unittest discover -s tests/harness -p 'test_*.py'
      - name: Check Python harness syntax
        run: python3 -m py_compile scripts/blueprint_harness.py scripts/blueprint_reference_harness.py scripts/blueprint_harness_cli.py scripts/blueprint_harness_paths.py scripts/blueprint_harness_projects.py scripts/blueprint_harness_worktrees.py scripts/prepare_reference_blueprints_pages.py
